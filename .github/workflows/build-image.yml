name: Build ComfyUI Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      # Узкий список — только то, что базовый Dockerfile реально COPY'ит.
      # post_start.sh / start.sh принадлежат Dockerfile.runpod и не должны
      # триггерить ребилд :latest (Vast) — иначе каждый фикс RunPod-hook
      # впустую пересобирал бы Vast-образ.
      - 'extras/ComfyUI_INSTARAW/**'
      - 'extras/KiaraPanels/**'
      - 'extras/OFM-SegmentQueueRunner-RU/**'
      - 'install.sh'
      - 'workflows/**'
      - 'lib/**'
  workflow_dispatch:

env:
  IMAGE_NAME: jkhlk/comfyui-ready

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
